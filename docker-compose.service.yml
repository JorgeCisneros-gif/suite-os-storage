# Solo servicios de infraestructura para desarrollo local
# El gateway corre fuera de Docker (npm run start:dev en tu máquina)

services:
  postgres:
    image: postgres:16-alpine
    container_name: suite_storage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storage_user
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: suite_storage
    ports:
      - "127.0.0.1:5432:5432"   # ahora SÍ expuesto al host para que el gateway local conecte
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: suite_storage_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_dev_123 --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"   # expuesto al host
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  

volumes:
  pgdata:
  redisdata: