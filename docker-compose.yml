name: suite-os-storage

# ============================================================
#  Suite-OS Storage Gateway — Docker Compose
# ============================================================

services:

  # ── Postgres dedicado del storage ──────────────────────────
  storage_db:
    image: postgres:16-alpine
    container_name: storage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-suite_storage}
      POSTGRES_USER:     ${POSTGRES_USER:-storage_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - storage_pgdata:/var/lib/postgresql/data
    networks:
      - edify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storage_user} -d ${POSTGRES_DB:-suite_storage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis dedicado del storage ─────────────────────────────
  storage_redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - storage_redis_data:/data
    networks:
      - edify_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Storage Gateway (NestJS) ───────────────────────────────
  storage_gateway:
    build:
      context: ./apps/storage-gateway
      target: production
    container_name: storage_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3100

      # ── Base de datos ────────────────────────────────────────
      DATABASE_URL: postgresql://${POSTGRES_USER:-storage_user}:${POSTGRES_PASSWORD}@storage_db:5432/${POSTGRES_DB:-suite_storage}
      # Bootstrap: TypeORM crea tablas desde entities. Cambiar a false
      # cuando tengas migrations escritas.
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      # SSL: solo activar si DB es externa (RDS, etc). Para Docker network: false.
      DB_SSL: ${DB_SSL:-false}

      # ── Redis ────────────────────────────────────────────────
      REDIS_URL: redis://:${REDIS_PASSWORD}@storage_redis:6379

      # ── Seguridad ────────────────────────────────────────────
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      # ── OAuth Google ─────────────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}

      # ── Storage temporal ─────────────────────────────────────
      TEMP_STORAGE_DIR: /var/lib/suite-storage/temp
      DEFAULT_RETENTION_DAYS: ${DEFAULT_RETENTION_DAYS:-90}
      ERROR_RETENTION_DAYS: ${ERROR_RETENTION_DAYS:-30}
      MAX_UPLOAD_RETRIES: ${MAX_UPLOAD_RETRIES:-3}

      # ── URLs frontend ────────────────────────────────────────
      DEPARMENTOS_URL: ${DEPARMENTOS_URL:-https://deparmentos.suite-os.app}
      INVENTORYOS_URL: ${INVENTORYOS_URL:-https://inventoryos.suite-os.app}

      # ── CORS ─────────────────────────────────────────────────
      CORS_ORIGINS: ${CORS_ORIGINS:-https://deparmentos.suite-os.app,https://inventoryos.suite-os.app}

    volumes:
      - ./temp-storage:/var/lib/suite-storage/temp

    depends_on:
      storage_db:
        condition: service_healthy
      storage_redis:
        condition: service_healthy

    networks:
      - edify_network

    ports:
      - "127.0.0.1:3100:3100"

# ── Volúmenes persistentes ─────────────────────────────────
volumes:
  storage_pgdata:
    name: storage_pgdata
  storage_redis_data:
    name: storage_redis_data

# ── Red ────────────────────────────────────────────────────
networks:
  edify_network:
    name: edify_network
    external: true
