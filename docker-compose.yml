name: suite-os-storage

# ============================================================
#  Suite-OS Storage Gateway — Docker Compose
# ============================================================

services:

  # ── Postgres dedicado del storage ──────────────────────────
  storage_db:
    image: postgres:16-alpine
    container_name: storage_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-suite_storage}
      POSTGRES_USER:     ${POSTGRES_USER:-storage_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - storage_pgdata:/var/lib/postgresql/data
    networks:
      - edify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storage_user} -d ${POSTGRES_DB:-suite_storage}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis dedicado del storage ─────────────────────────────
  storage_redis:
    image: redis:7-alpine
    container_name: storage_redis
    restart: unless-stopped
    # El password se inyecta directamente al command vía interpolación
    # de Docker Compose (resuelta en el host antes de pasar al container).
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # También se expone como env var dentro del container para que
    # redis-cli del healthcheck pueda autenticarse.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - storage_redis_data:/data
    networks:
      - edify_network
    healthcheck:
      # Usamos sh -c para que la expansión de $REDIS_PASSWORD ocurra
      # DENTRO del container (no en el host de Docker Compose).
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Storage Gateway (NestJS) ───────────────────────────────
  storage_gateway:
    build:
      context: ./apps/storage-gateway
      target: production
    container_name: storage_gateway
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 3100

      DATABASE_URL: postgresql://${POSTGRES_USER:-storage_user}:${POSTGRES_PASSWORD}@storage_db:5432/${POSTGRES_DB:-suite_storage}
      REDIS_URL: redis://:${REDIS_PASSWORD}@storage_redis:6379

      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}

      TEMP_STORAGE_DIR: /var/lib/suite-storage/temp
      DEFAULT_RETENTION_DAYS: ${DEFAULT_RETENTION_DAYS:-90}
      ERROR_RETENTION_DAYS: ${ERROR_RETENTION_DAYS:-30}
      MAX_UPLOAD_RETRIES: ${MAX_UPLOAD_RETRIES:-3}

      DEPARMENTOS_URL: ${DEPARMENTOS_URL:-https://deparmentos.suite-os.app}
      INVENTORYOS_URL: ${INVENTORYOS_URL:-https://inventoryos.suite-os.app}

      CORS_ORIGINS: ${CORS_ORIGINS:-https://deparmentos.suite-os.app,https://inventoryos.suite-os.app}

    volumes:
      - ./temp-storage:/var/lib/suite-storage/temp

    depends_on:
      storage_db:
        condition: service_healthy
      storage_redis:
        condition: service_healthy

    networks:
      - edify_network

    # Puerto 3100 expuesto SOLO en localhost del server.
    # Cloudflared (en el host) accede aquí para enrutar storage.suite-os.app
    ports:
      - "127.0.0.1:3100:3100"

# ── Volúmenes persistentes ─────────────────────────────────
volumes:
  storage_pgdata:
    name: storage_pgdata
  storage_redis_data:
    name: storage_redis_data

# ── Red ────────────────────────────────────────────────────
networks:
  edify_network:
    name: edify_network
    external: true