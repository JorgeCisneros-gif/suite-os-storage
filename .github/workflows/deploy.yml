name: Deploy to serverj01

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite trigger manual desde la UI de GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy al servidor via Cloudflare Tunnel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e

            REPO_DIR=~/apps/suite-os-storage

            echo "── Verificar que el repo existe ──"
            if [ ! -d "$REPO_DIR" ]; then
              echo "❌ Directorio $REPO_DIR no existe."
              echo "   Hacer setup inicial primero (ver README.md del repo)."
              exit 1
            fi

            cd "$REPO_DIR"

            echo "── Pull últimos cambios desde main ──"
            git fetch origin main
            git reset --hard origin/main

            echo "── Verificar que .env existe ──"
            if [ ! -f .env ]; then
              echo "❌ No existe .env. Hacer setup inicial primero."
              exit 1
            fi

            echo "── Build y restart de servicios (con --no-deps para no reiniciar DB ni Redis innecesariamente) ──"
            docker compose pull storage_gateway 2>/dev/null || true
            docker compose up -d --build storage_gateway

            echo "── Estado de los containers ──"
            docker compose ps

            echo "── Verificar healthcheck ──"
            sleep 5
            docker compose exec -T storage_gateway wget -q --spider http://localhost:3100/api/v1/health && \
              echo "✅ Storage Gateway respondiendo OK" || \
              echo "⚠️  Storage Gateway no responde aún (puede tardar un momento)"

            echo "✅ Deploy completado $(date)"
