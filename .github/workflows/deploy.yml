name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
          sudo dpkg -i cloudflared.deb

      - name: Configurar SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat >> ~/.ssh/config << EOF
          Host ssh.suite-os.app
            HostName ssh.suite-os.app
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            ProxyCommand cloudflared access ssh --hostname %h
          EOF

      - name: Deploy al servidor
        run: |
          ssh ${{ secrets.SSH_USER }}@ssh.suite-os.app << 'ENDSSH'
            set -e

            REPO_DIR=~/apps/suite-os-storage

            echo "── Verificar que el repo existe ──"
            if [ ! -d "$REPO_DIR" ]; then
              echo "❌ Directorio $REPO_DIR no existe."
              exit 1
            fi

            cd "$REPO_DIR"

            echo "── Detectar si docker-compose.yml cambió ──"
            # Capturamos el hash del compose ANTES del pull
            COMPOSE_BEFORE=$(sha256sum docker-compose.yml 2>/dev/null | cut -d' ' -f1 || echo "")

            echo "── Pull últimos cambios ──"
            git fetch origin main
            git reset --hard origin/main

            # Capturamos el hash DESPUÉS del pull
            COMPOSE_AFTER=$(sha256sum docker-compose.yml | cut -d' ' -f1)

            echo "── Verificar que .env existe ──"
            if [ ! -f .env ]; then
              echo "❌ No existe .env en el servidor."
              exit 1
            fi

            # Si cambió el compose, hay que force-recreate (variables del environment
            # solo se aplican al crear el container, no al hacer restart)
            if [ "$COMPOSE_BEFORE" != "$COMPOSE_AFTER" ]; then
              echo "── docker-compose.yml cambió → FORCE RECREATE ──"
              docker compose up -d --build --force-recreate storage_gateway
            else
              echo "── docker-compose.yml sin cambios → solo rebuild ──"
              docker compose up -d --build storage_gateway
            fi

            echo "── Estado final ──"
            docker compose ps

            echo "── Verificar healthcheck ──"
            sleep 8
            docker compose exec -T storage_gateway wget -q --spider http://localhost:3100/api/v1/health && \
              echo "✅ Storage Gateway respondiendo OK" || \
              echo "⚠️  Storage Gateway aún no responde"

            echo "✅ Deploy completado $(date)"
          ENDSSH
